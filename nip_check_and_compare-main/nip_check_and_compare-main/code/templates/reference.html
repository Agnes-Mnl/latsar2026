<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Data Reconciliation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom scrollbar agar terlihat rapi */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }

        .code-font {
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
        }
    </style>
</head>

<body class="bg-gray-50 text-gray-800 font-sans min-h-screen">

    <nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <span class="text-xl font-bold text-indigo-600 tracking-tight">Data<span
                            class="text-gray-900">Diff</span>Checker</span>
                </div>
                <div class="flex items-center space-x-4">
                    <span class="text-sm text-gray-500">Cabang A vs Cabang B</span>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

        <div id="summary-view" class="space-y-6">
            <div class="flex justify-between items-end">
                <div>
                    <h2 class="text-2xl font-bold text-gray-900">Inkonsistensi Produk</h2>
                    <p class="mt-1 text-sm text-gray-500">Daftar produk yang memiliki perbedaan data antara kedua
                        dataset.</p>
                </div>
                <div class="text-sm bg-yellow-50 text-yellow-700 px-3 py-1 rounded-md border border-yellow-200">
                    <span id="conflict-count" class="font-bold">0</span> Isu Ditemukan
                </div>
            </div>

            <div class="bg-white shadow overflow-hidden sm:rounded-lg border border-gray-200">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th scope="col"
                                class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider w-1/6">
                                Product ID</th>
                            <th scope="col"
                                class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                Kolom Tidak Konsisten</th>
                            <th scope="col"
                                class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider w-1/6">
                                Action</th>
                        </tr>
                    </thead>
                    <tbody id="summary-table-body" class="bg-white divide-y divide-gray-200">
                    </tbody>
                </table>
            </div>
        </div>

        <div id="detail-view" class="hidden space-y-6">
            <div class="flex items-center justify-between">
                <button onclick="showSummary()"
                    class="flex items-center text-sm text-gray-600 hover:text-indigo-600 transition-colors">
                    <svg class="w-5 h-5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                    </svg>
                    Kembali ke Daftar
                </button>
                <div class="text-right">
                    <h2 class="text-xl font-bold text-gray-900">Product ID: <span id="detail-id"
                            class="text-indigo-600 font-mono"></span></h2>
                    <p class="text-xs text-gray-500">Perbandingan Data Mentah</p>
                </div>
            </div>

            <div
                class="grid grid-cols-2 gap-0 border border-gray-300 rounded-lg overflow-hidden bg-white shadow-sm code-font text-sm">
                <div class="bg-gray-100 p-3 border-b border-r border-gray-300 font-semibold text-center text-red-600">
                    Dataset Cabang A (Original/Left)
                </div>
                <div class="bg-gray-100 p-3 border-b border-gray-300 font-semibold text-center text-green-600">
                    Dataset Cabang B (Incoming/Right)
                </div>

                <div id="diff-left" class="border-r border-gray-200 bg-white">
                </div>
                <div id="diff-right" class="bg-white">
                </div>
            </div>
        </div>

    </main>

    <script>
        // --- 1. MOCK DATASETS ---
        // Dataset Cabang A (Misal: Database Pusat)
        const datasetA = [
            { product_id: 101, product_name: "Wireless Mouse Logitech M690", sku: "LOG-M330-BLK", category: "Electronics", brand: "Logitech", price: 12220, stock_quantity: 45, discount_percent: 5.0, rating: 4.8, is_active: true },
            { product_id: 102, product_name: "Mechanical Keyboard Keychron K2", sku: "KEY-K2-RGB", category: "Electronics", brand: "Keychron", price: 1200000, stock_quantity: 10, discount_percent: 0, rating: 4.9, is_active: true },
            { product_id: 103, product_name: "Samsung Monitor 24 inch", sku: "SAM-24-FHD", category: "Electronics", brand: "Samsung", price: 1500000, stock_quantity: 100, discount_percent: 10, rating: 4.5, is_active: true }
        ];

        // Dataset Cabang B (Misal: Data Cabang yang baru masuk)
        const datasetB = [
            // ID 101: Name & Price beda (Sesuai request gambar)
            { product_id: 101, product_name: "Wireless Mouse Logitech M330", sku: "LOG-M330-BLK", category: "Electronics", brand: "Logitech", price: 150000, stock_quantity: 45, discount_percent: 5.0, rating: 4.8, is_active: true },
            // ID 102: Stock beda
            { product_id: 102, product_name: "Mechanical Keyboard Keychron K2", sku: "KEY-K2-RGB", category: "Electronics", brand: "Keychron", price: 1200000, stock_quantity: 8, discount_percent: 0, rating: 4.9, is_active: true },
            // ID 103: Sama persis (Tidak akan muncul di list error)
            { product_id: 103, product_name: "Samsung Monitor 24 inch", sku: "SAM-24-FHD", category: "Electronics", brand: "Samsung", price: 1500000, stock_quantity: 100, discount_percent: 10, rating: 4.5, is_active: true }
        ];

        // --- 2. LOGIC: COMPARISON ---

        function findDifferences(dataA, dataB) {
            const discrepancies = [];

            dataA.forEach(itemA => {
                const itemB = dataB.find(i => i.product_id === itemA.product_id);
                if (itemB) {
                    const diffKeys = [];
                    // Loop semua key di object
                    Object.keys(itemA).forEach(key => {
                        if (itemA[key] !== itemB[key]) {
                            diffKeys.push(key);
                        }
                    });

                    if (diffKeys.length > 0) {
                        discrepancies.push({
                            id: itemA.product_id,
                            diffCols: diffKeys,
                            objA: itemA,
                            objB: itemB
                        });
                    }
                }
            });
            return discrepancies;
        }

        const discrepancies = findDifferences(datasetA, datasetB);

        // --- 3. UI RENDERING ---

        // Render Summary Table
        function renderSummary() {
            const tableBody = document.getElementById('summary-table-body');
            document.getElementById('conflict-count').innerText = discrepancies.length;

            let html = '';

            discrepancies.forEach(item => {
                // Join kolom yang error dengan koma, misal: "product_name, price"
                const errorColumns = item.diffCols.map(col =>
                    `<span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-red-100 text-red-800 mr-1">${col}</span>`
                ).join('');

                html += `
                    <tr class="hover:bg-gray-50 transition-colors cursor-pointer" onclick="showDetail(${item.id})">
                        <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900 font-mono">
                            ${item.id}
                        </td>
                        <td class="px-6 py-4">
                            <div class="flex flex-wrap gap-1">
                                ${errorColumns}
                            </div>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                            <span class="text-indigo-600 hover:text-indigo-900 font-semibold">Lihat Detail &rarr;</span>
                        </td>
                    </tr>
                `;
            });

            if (discrepancies.length === 0) {
                html = `<tr><td colspan="3" class="px-6 py-4 text-center text-gray-500">Semua data konsisten!</td></tr>`;
            }

            tableBody.innerHTML = html;
        }

        // Render Detail Diff View
        function showDetail(id) {
            const item = discrepancies.find(d => d.id === id);
            if (!item) return;

            document.getElementById('summary-view').classList.add('hidden');
            document.getElementById('detail-view').classList.remove('hidden');
            document.getElementById('detail-id').innerText = id;

            const leftContainer = document.getElementById('diff-left');
            const rightContainer = document.getElementById('diff-right');

            let leftHTML = '';
            let rightHTML = '';
            let lineNum = 1;

            // Kita asumsikan key object nya sama
            Object.keys(item.objA).forEach(key => {
                const valA = item.objA[key];
                const valB = item.objB[key];
                const isDiff = valA !== valB;

                // Styling logic mirip Diffchecker
                // Left: Merah pudar jika beda
                // Right: Hijau pudar jika beda
                const leftClass = isDiff ? 'bg-red-100 text-red-900' : 'text-gray-600';
                const rightClass = isDiff ? 'bg-green-100 text-green-900' : 'text-gray-600';

                // Highlight spesifik value nya
                const valAStyle = isDiff ? 'bg-red-200 px-1 rounded' : '';
                const valBStyle = isDiff ? 'bg-green-200 px-1 rounded' : '';

                // Generate Row Left
                leftHTML += `
                    <div class="flex items-stretch border-b border-gray-100 ${leftClass}">
                        <div class="w-10 text-right pr-3 py-2 select-none text-gray-400 text-xs border-r border-gray-200 bg-gray-50 flex items-center justify-end">${lineNum}</div>
                        <div class="flex-1 px-4 py-2 break-all overflow-hidden">
                            <span class="text-purple-600 font-semibold select-none">${key}:</span> 
                            <span class="${valAStyle}">${valA}</span>,
                        </div>
                    </div>
                `;

                // Generate Row Right
                rightHTML += `
                    <div class="flex items-stretch border-b border-gray-100 ${rightClass}">
                        <div class="w-10 text-right pr-3 py-2 select-none text-gray-400 text-xs border-r border-gray-200 bg-gray-50 flex items-center justify-end">${lineNum}</div>
                        <div class="flex-1 px-4 py-2 break-all overflow-hidden">
                            <span class="text-purple-600 font-semibold select-none">${key}:</span> 
                            <span class="${valBStyle}">${valB}</span>,
                        </div>
                    </div>
                `;

                lineNum++;
            });

            leftContainer.innerHTML = leftHTML;
            rightContainer.innerHTML = rightHTML;
        }

        function showSummary() {
            document.getElementById('detail-view').classList.add('hidden');
            document.getElementById('summary-view').classList.remove('hidden');
        }

        // Initialize
        renderSummary();

    </script>
</body>

</html>
